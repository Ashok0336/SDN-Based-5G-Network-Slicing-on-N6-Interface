    onos:
        container_name: onos
        image: onosproject/onos
        restart: always
        ports:
            - "8181:8181"   # Web GUI & REST API
            - "8101:8101"   # CLI over SSH
            - "6653:6653"   # OpenFlow (new)
            - "6633:6633"   # OpenFlow (legacy)
        environment:
            - ONOS_APPS=gui2,openflow
        networks:
            public_net:
                ipv4_address: 192.168.71.160
    ovs:
        build: ./ovs
        image: custom-ovs:noble
        container_name: ovs
        privileged: true
        network_mode: host
        pid: host
        restart: unless-stopped
        depends_on:
           - oai-upf
           - oai-ext-dn
           - onos
        environment:
          UPF_CONT: "rfsim5g-oai-upf"
          EDN_CONT: "rfsim5g-oai-ext-dn"
          UPF_N6_IF: "n6ovs0"           # IMPORTANT: do not use eth1
          EDN_IF: "dn0"
          ONOS_CTRL: "172.17.0.1:6653"
        volumes:
            - ./ovs-init.sh:/ovs-init.sh:ro
            - ./ovs-start.sh:/ovs-start.sh:ro
            - /var/run/docker.sock:/var/run/docker.sock
        command: ["/bin/bash", "/ovs-start.sh"]

networks:
    public_net:
        driver: bridge
        name: rfsim5g-oai-public-net
        ipam:
            config:
                - subnet: 192.168.71.128/26
        driver_opts:
            com.docker.network.bridge.name: "rfsim5g-public"
    traffic_net:
        driver: bridge
        name: rfsim5g-oai-traffic-net
        ipam:
            config:
                - subnet: 192.168.72.128/26
        driver_opts:
            com.docker.network.bridge.name: "rfsim5g-traffic"
